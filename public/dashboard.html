<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q Care Dashboard</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #050a16;
  color: white;
}

/* layout */
.container {
  width: 100%;
}

.content {
  width: 100%;
}

/* 🔥 IMAGE GRID (vertical by default) */
.image-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  padding: 16px;
}

/* 🔥 EQUAL SIZE IMAGES */
.image-grid img {
  width: 100%;
  height: 250px;   /* same size */
  object-fit: cover;
  display: block;

  border-radius: 12px;

  transition: transform 0.3s ease;
}

.image-grid img:hover {
  transform: scale(1.02);
}

/* 🔥 side by side only on large screens */
@media (min-width: 900px) {
  .image-grid {
    grid-template-columns: repeat(3, 1fr);
  }

  .image-grid img {
    height: 200px;
  }
}

/* 🔥 logout button (same, just spacing) */
#logoutBtn {
  margin: 25px auto;
  display: block;

  padding: 14px 24px;
  border-radius: 14px;
  border: none;

  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: white;

  font-size: 15px;
  cursor: pointer;

  box-shadow: 0 10px 30px rgba(239, 68, 68, 0.5);
  transition: all 0.3s ease;
}

#logoutBtn:hover {
  transform: translateY(-3px);
}

#logoutBtn:active {
  transform: scale(0.97);
}





.search-bar {
  padding: 16px;
}

.search-bar input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: none;
  outline: none;

  font-size: 14px;

  background: rgba(255,255,255,0.08);
  color: white;

  backdrop-filter: blur(10px);
}

/* 🔥 CITY CARD */
.city-card {
  position: relative;
  overflow: hidden;
  border-radius: 12px;
}

/* city name overlay */
.city-name {
  position: absolute;
  top: 10px;
  left: 12px;

  font-size: 14px;
  font-weight: 600;

  background: rgba(0,0,0,0.6);
  padding: 6px 10px;
  border-radius: 8px;

  z-index: 2;
}

.section-title {
  padding: 16px 16px 0;
  font-size: 20px;
  font-weight: 600;
  text-align: left;
  color: #e2e8f0;
}


/* 🔥 POPUP BACKDROP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);

  display: none;
  justify-content: center;
  align-items: center;

  z-index: 1000;
}

/* popup box */
.popup-content {
  width: 95%;
  max-width: 1000px;
  max-height: 90vh;
  overflow-y: auto;

  background: #0b1220;
  border-radius: 16px;
  padding: 16px;

  position: relative;
}

/* close button */
.close-btn {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 28px;
  cursor: pointer;
}

/* hospital card */
.hospital-card {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
}

.hospital-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* hospital name */
.hospital-name {
  position: absolute;
  top: 10px;
  left: 10px;

  background: rgba(0,0,0,0.6);
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 14px;
}

/* ⭐ rating */
.rating {
  position: absolute;
  bottom: 10px;
  left: 10px;

  background: rgba(0,0,0,0.6);
  padding: 6px 10px;
  border-radius: 8px;

  color: gold;
}
</style>

  
</head>
<body>

<main class="container">
  <div class="content">
    
    <div class="dashboard-card">

      <h2 class="section-title">Select City</h2>

     <!-- 🔥 SEARCH BAR -->
<div class="search-bar">
  <input type="text" id="citySearch" placeholder="Select city..." />
</div>

<div class="image-grid" id="cityGrid">

  <div class="city-card" data-city="Bangalore">
    <p class="city-name">Bangalore</p>
    <img src="https://i.ibb.co/3mFPDfvk/IMG-20260405-WA0002.jpg">
  </div>

  <div class="city-card" data-city="Mumbai">
    <p class="city-name">Mumbai</p>
    <img src="https://i.ibb.co/hx5yknqh/IMG-20260405-WA0001.jpg">
  </div>

  <div class="city-card" data-city="Delhi">
    <p class="city-name">Delhi</p>
    <img src="https://i.ibb.co/n8bhNJBT/IMG-20260405-WA0000.jpg">
  </div>

</div>

      <button id="logoutBtn">Logout</button>

    </div>

  </div>
</main>

<!-- 🔥 HOSPITAL POPUP -->
<div id="hospitalPopup" class="popup">
  <div class="popup-content">

    <span id="closePopup" class="close-btn">&times;</span>

    <h2 id="popupTitle" class="section-title">Hospitals</h2>

    <div class="image-grid" id="hospitalGrid"></div>

  </div>
</div>

  <script>
    // Protect page (fake auth check)
    const isLoggedIn = localStorage.getItem("auth");

    if (!isLoggedIn) {
      window.location.replace("index.html");
    }

    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("auth");
      window.location.replace("index.html");
    });




    
const searchInput = document.getElementById("citySearch");
const cityCards = document.querySelectorAll(".city-card");

searchInput.addEventListener("input", () => {
  const value = searchInput.value.toLowerCase();

  cityCards.forEach(card => {
    const city = card.getAttribute("data-city").toLowerCase();

    if (city.includes(value)) {
      card.style.display = "";
    } else {
      card.style.display = "none";
    }
  });
});



// 🔥 POPUP ELEMENTS
const popup = document.getElementById("hospitalPopup");
const closePopup = document.getElementById("closePopup");
const hospitalGrid = document.getElementById("hospitalGrid");
const popupTitle = document.getElementById("popupTitle");

// 🔥 HOSPITAL DATA
const hospitalData = {
  Bangalore: [
    { name: "Apollo Hospital", img: "https://images.unsplash.com/photo-1586773860418-d37222d8fce3?auto=format&fit=crop&w=800&q=80" },
    { name: "Manipal Hospital", img: "https://images.unsplash.com/photo-1579684385127-1ef15d508118?auto=format&fit=crop&w=800&q=80" }
  ],
  Mumbai: [
    { name: "Lilavati Hospital", img: "https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=800&q=80" },
    { name: "Kokilaben Hospital", img: "https://images.unsplash.com/photo-1587351021759-3e566b6af7cc?auto=format&fit=crop&w=800&q=80" }
  ],
  Delhi: [
    { name: "AIIMS", img: "https://images.unsplash.com/photo-1581595219315-a187dd40c322?auto=format&fit=crop&w=800&q=80" },
    { name: "Fortis Hospital", img: "https://images.unsplash.com/photo-1606813907291-d86efa9b94db?auto=format&fit=crop&w=800&q=80" }
  ]
};

// 🔥 OPEN POPUP
document.querySelectorAll(".city-card").forEach(card => {
  card.addEventListener("click", () => {
    const city = card.getAttribute("data-city");

    popup.style.display = "flex";
    popupTitle.innerText = city + " Hospitals";

    hospitalGrid.innerHTML = "";
const hospitals = hospitalData[city] || [];
    hospitals.forEach(h => {
      const div = document.createElement("div");
      div.className = "hospital-card";

      div.innerHTML = `
        <img src="${h.img}">
        <p class="hospital-name">${h.name}</p>
        <p class="rating">★★★★☆</p>
      `;

      hospitalGrid.appendChild(div);
    });
  });
});

// 🔥 CLOSE BUTTON
closePopup.addEventListener("click", () => {
  popup.style.display = "none";
});

// 🔥 CLICK OUTSIDE TO CLOSE
popup.addEventListener("click", (e) => {
  if (e.target === popup) {
    popup.style.display = "none";
  }
});
  </script>

</body>
</html>
