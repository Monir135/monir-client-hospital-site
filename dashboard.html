<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q Care Dashboard</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #050a16;
  color: white;
}

/* layout */
.container {
  width: 100%;
}

.content {
  width: 100%;
}

/* 🔥 IMAGE GRID (vertical by default) */
.image-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  padding: 16px;
}

/* 🔥 EQUAL SIZE IMAGES */
.image-grid img {
  width: 100%;
  height: 250px;   /* same size */
  object-fit: cover;
  display: block;

  border-radius: 12px;

  transition: transform 0.3s ease;
}

.image-grid img:hover {
  transform: scale(1.02);
}

/* 🔥 side by side only on large screens */
@media (min-width: 900px) {
  .image-grid {
    grid-template-columns: repeat(3, 1fr);
  }

  .image-grid img {
    height: 200px;
  }
}

/* 🔥 logout button (same, just spacing) */
#logoutBtn {
  margin: 25px auto;
  display: block;

  padding: 14px 24px;
  border-radius: 14px;
  border: none;

  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: white;

  font-size: 15px;
  cursor: pointer;

  box-shadow: 0 10px 30px rgba(239, 68, 68, 0.5);
  transition: all 0.3s ease;
}

#logoutBtn:hover {
  transform: translateY(-3px);
}

#logoutBtn:active {
  transform: scale(0.97);
}
</style>

  
</head>
<body>

<main class="container">
  <div class="content">
    
    <div class="dashboard-card">

      <div class="image-grid">
        <img src="https://i.ibb.co/3mFPDfvk/IMG-20260405-WA0002.jpg">
        <img src="https://i.ibb.co/hx5yknqh/IMG-20260405-WA0001.jpg">
        <img src="https://i.ibb.co/n8bhNJBT/IMG-20260405-WA0000.jpg">
      </div>

      <button id="logoutBtn">Logout</button>

    </div>

  </div>
</main>

  <script>
    // Protect page (fake auth check)
    const isLoggedIn = localStorage.getItem("auth");

    if (!isLoggedIn) {
      window.location.replace("index.html");
    }

    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("auth");
      window.location.replace("index.html");
    });
  </script>

</body>
</html>
