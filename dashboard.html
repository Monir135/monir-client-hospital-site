<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q Care Dashboard</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: #050a16;
  color: white;
}

/* layout */
.container {
  width: 100%;
}

.content {
  width: 100%;
}

/* 🔥 IMAGE GRID (vertical by default) */
.image-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  padding: 16px;
}

/* 🔥 EQUAL SIZE IMAGES */
.image-grid img {
  width: 100%;
  height: 250px;   /* same size */
  object-fit: cover;
  display: block;

  border-radius: 12px;

  transition: transform 0.3s ease;
}

.image-grid img:hover {
  transform: scale(1.02);
}

/* 🔥 side by side only on large screens */
@media (min-width: 900px) {
  .image-grid {
    grid-template-columns: repeat(3, 1fr);
  }

  .image-grid img {
    height: 200px;
  }
}

/* 🔥 logout button (same, just spacing) */
#logoutBtn {
  margin: 25px auto;
  display: block;

  padding: 14px 24px;
  border-radius: 14px;
  border: none;

  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: white;

  font-size: 15px;
  cursor: pointer;

  box-shadow: 0 10px 30px rgba(239, 68, 68, 0.5);
  transition: all 0.3s ease;
}

#logoutBtn:hover {
  transform: translateY(-3px);
}

#logoutBtn:active {
  transform: scale(0.97);
}





.search-bar {
  padding: 16px;
}

.search-bar input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: none;
  outline: none;

  font-size: 14px;

  background: rgba(255,255,255,0.08);
  color: white;

  backdrop-filter: blur(10px);
}

/* 🔥 CITY CARD */
.city-card {
  position: relative;
  overflow: hidden;
  border-radius: 12px;
}

/* city name overlay */
.city-name {
  position: absolute;
  top: 10px;
  left: 12px;

  font-size: 14px;
  font-weight: 600;

  background: rgba(0,0,0,0.6);
  padding: 6px 10px;
  border-radius: 8px;

  z-index: 2;
}

.section-title {
  padding: 16px 16px 0;
  font-size: 20px;
  font-weight: 600;
  text-align: left;
  color: #e2e8f0;
}
</style>

  
</head>
<body>

<main class="container">
  <div class="content">
    
    <div class="dashboard-card">

      <h2 class="section-title">Select City</h2>

     <!-- 🔥 SEARCH BAR -->
<div class="search-bar">
  <input type="text" id="citySearch" placeholder="Select city..." />
</div>

<div class="image-grid" id="cityGrid">

  <div class="city-card" data-city="Bangalore">
    <p class="city-name">Bangalore</p>
    <img src="https://i.ibb.co/3mFPDfvk/IMG-20260405-WA0002.jpg">
  </div>

  <div class="city-card" data-city="Mumbai">
    <p class="city-name">Mumbai</p>
    <img src="https://i.ibb.co/hx5yknqh/IMG-20260405-WA0001.jpg">
  </div>

  <div class="city-card" data-city="Delhi">
    <p class="city-name">Delhi</p>
    <img src="https://i.ibb.co/n8bhNJBT/IMG-20260405-WA0000.jpg">
  </div>

</div>

      <button id="logoutBtn">Logout</button>

    </div>

  </div>
</main>

  <script>
    // Protect page (fake auth check)
    const isLoggedIn = localStorage.getItem("auth");

    if (!isLoggedIn) {
      window.location.replace("index.html");
    }

    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("auth");
      window.location.replace("index.html");
    });




    
const searchInput = document.getElementById("citySearch");
const cityCards = document.querySelectorAll(".city-card");

searchInput.addEventListener("input", () => {
  const value = searchInput.value.toLowerCase();

  cityCards.forEach(card => {
    const city = card.getAttribute("data-city").toLowerCase();

    if (city.includes(value)) {
      card.style.display = "";
    } else {
      card.style.display = "none";
    }
  });
});
  </script>

</body>
</html>
