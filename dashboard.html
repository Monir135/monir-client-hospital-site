<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q Care Dashboard</title>

  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: #050a16;
    color: white;
    min-height: 100vh;

    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    padding: 20px;
    display: flex;
    justify-content: center;
  }

  .content {
    width: 100%;
    max-width: 900px;
    text-align: center;
  }

  /* 🔥 GLASS CARD */
  .dashboard-card {
    padding: 30px;
    border-radius: 24px;

    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(25px) saturate(180%);
    -webkit-backdrop-filter: blur(25px);

    border: 1px solid rgba(255, 255, 255, 0.12);

    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.8),
      inset 0 1px 0 rgba(255, 255, 255, 0.2);
  }

  /* 🔥 IMAGE GRID */
  .image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .image-grid img {
    width: 100%;
    height: 220px;
    object-fit: cover;

    border-radius: 16px;

    transition: 0.4s ease;

    box-shadow: 0 10px 25px rgba(0,0,0,0.6);
  }

  .image-grid img:hover {
    transform: scale(1.05);
  }

  /* 🔥 LOGOUT BUTTON */
  #logoutBtn {
    padding: 14px 20px;
    border-radius: 14px;
    border: none;

    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;

    font-size: 15px;
    cursor: pointer;

    box-shadow: 0 10px 30px rgba(239, 68, 68, 0.5);
    transition: 0.3s ease;
  }

  #logoutBtn:hover {
    transform: translateY(-3px);
  }
</style>

  
</head>
<body>

<main class="container">
  <div class="content">
    
    <div class="dashboard-card">

      <div class="image-grid">
        <img src="https://i.ibb.co/3mFPDfvk/IMG-20260405-WA0002.jpg">
        <img src="https://i.ibb.co/hx5yknqh/IMG-20260405-WA0001.jpg">
        <img src="https://i.ibb.co/n8bhNJBT/IMG-20260405-WA0000.jpg">
      </div>

      <button id="logoutBtn">Logout</button>

    </div>

  </div>
</main>

  <script>
    // Protect page (fake auth check)
    const isLoggedIn = localStorage.getItem("auth");

    if (!isLoggedIn) {
      window.location.replace("index.html");
    }

    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("auth");
      window.location.replace("index.html");
    });
  </script>

</body>
</html>
