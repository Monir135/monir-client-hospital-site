<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <title>Q Care</title>
</head>

<body>

  <div class="pattern">
    <div class="pattern-inner" id="patternText"></div>
  </div>

  <main class="container">
    <div class="content">

      <!-- 🔥 LOGO WRAPPER -->
      <div class="logo">
        <img src="src/assets/logo.jpg" alt="Q Care Logo">
      </div>

      <!-- 🔥 PREMIUM TAGLINE -->
      <p class="tagline">
        Your well <span>wisher</span>
      </p>

      <div class="auth-card">

        <button class="google-btn">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg">
          Continue with Google
        </button>

        <div class="divider"><span>or</span></div>

        <button class="phone-btn">
          Continue with Phone (OTP)
        </button>

      </div>

    </div>
  </main>

  <script type="module" src="src/main.js"></script>
</body>

</html>
