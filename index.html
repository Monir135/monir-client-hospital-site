<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet">


  <title>Q Care</title>
</head>

<body>

  <div class="pattern">
    <div class="pattern-inner" id="patternText"></div>
  </div>

  <main class="container">
    <div class="content">

      <!-- 🔥 LOGO WRAPPER -->
      <div class="logo">
        <img src="src/assets/logo.jpg" alt="Q Care Logo">
      </div>

      <!-- 🔥 PREMIUM TAGLINE -->
      <p class="tagline">
        Your well <span>wisher</span>
      </p>

      <div class="auth-card">

        <button class="google-btn">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg">
          Continue with Google
        </button>

        <div class="divider"><span>or</span></div>

        <button class="phone-btn">
          Continue with Phone (OTP)
        </button>

      </div>



      <!-- 🔥 PHONE AUTH MODAL -->
<div class="otp-modal" id="otpModal">
  <div class="otp-box">
    <h3>Phone Verification</h3>

    <input type="text" id="phoneInput" placeholder="Enter phone number" />

    <div id="otpSection" style="display:none;">
      <input type="text" id="otpInput" placeholder="Enter OTP" />
    </div>

    <button id="sendOtpBtn">Send OTP</button>
    <button id="verifyOtpBtn" style="display:none;">Verify OTP</button>

    <p class="otp-note">Demo OTP: <b>1234</b></p>
  </div>
</div>


<!-- 🔥 GOOGLE AUTH MODAL -->
<div class="google-modal" id="googleModal">
  <div class="google-box">
    <h3>Choose an account</h3>

    <div class="google-user" id="googleUser">
<img src="https://randomuser.me/api/portraits/men/32.jpg" />
      <div>
        <p>demo.user@gmail.com</p>
        <span>Use this account</span>
      </div>
    </div>

    <p class="google-note">Demo Google Authentication</p>
  </div>
</div>

    </div>
  </main>

  <script type="module" src="src/main.js"></script>
</body>

</html>
